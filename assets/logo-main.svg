<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 40" width="224" height="40" role="img" aria-label="Safari Wings Travel">
  <title>Safari Wings Travel</title>
  <!--
    HORIZONTAL NAVBAR LOGO
    Wing mark (left) + brand name (right)
    ViewBox: 224 × 40 units
    Icon occupies x 0–52, text starts at x 62
  -->

  <!-- ── WING MARK ── -->

  <!-- Stroke 3: gold, lowest, drawn first -->
  <path
    d="M 4 35 C 12 33 24 30 38 29"
    stroke="#c8922a"
    stroke-width="2.2"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Stroke 2: royal blue, mid sweep -->
  <path
    d="M 4 35 C 14 29 27 22 46 19"
    stroke="#1e5bbc"
    stroke-width="2.9"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Stroke 1: deep navy, highest sweep, thickest -->
  <path
    d="M 4 35 C 16 25 33 13 48 5"
    stroke="#0d2b4e"
    stroke-width="3.6"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Origin anchor dot: gold -->
  <circle cx="4" cy="35" r="2.6" fill="#c8922a" />

  <!-- ── SEPARATOR ── -->
  <line x1="58" y1="8" x2="58" y2="32" stroke="#d0e4f5" stroke-width="1" />

  <!-- ── BRAND TEXT ── -->

  <!-- "Safari Wings" — serif, navy, bold -->
  <text
    x="66"
    y="23"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="17"
    font-weight="700"
    fill="#0d2b4e"
    letter-spacing="-0.3"
  >Safari Wings</text>

  <!-- "TRAVEL" — sans-serif, gold, tracked -->
  <text
    x="67"
    y="33.5"
    font-family="Arial, Helvetica, sans-serif"
    font-size="8.5"
    font-weight="600"
    fill="#c8922a"
    letter-spacing="4"
  >TRAVEL</text>

</svg>
