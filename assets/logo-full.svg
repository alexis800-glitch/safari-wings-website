<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 108" width="140" height="108" role="img" aria-label="Safari Wings Travel">
  <title>Safari Wings Travel</title>
  <!--
    FULL STACKED LOGO — for footer card, letterheads, branding sections
    Wing mark centered top + brand name stacked below
    ViewBox: 140 × 108 units
    Icon centred at x=45 (width 50), y=4
    Text centred at x=70
  -->

  <!-- ── WING MARK — centred in 140-wide space ── -->
  <g transform="translate(45, 6)">

    <!-- Stroke 3: gold, lowest sweep -->
    <path
      d="M 4 34 C 12 32 24 29 38 28"
      stroke="#c8922a"
      stroke-width="2.4"
      stroke-linecap="round"
      fill="none"
    />

    <!-- Stroke 2: royal blue, mid sweep -->
    <path
      d="M 4 34 C 15 28 28 21 46 18"
      stroke="#1e5bbc"
      stroke-width="3.2"
      stroke-linecap="round"
      fill="none"
    />

    <!-- Stroke 1: deep navy, highest sweep, thickest -->
    <path
      d="M 4 34 C 16 24 33 12 48 4"
      stroke="#0d2b4e"
      stroke-width="4"
      stroke-linecap="round"
      fill="none"
    />

    <!-- Origin anchor: gold -->
    <circle cx="4" cy="34" r="3" fill="#c8922a" />

  </g>

  <!-- ── SEPARATOR ── -->
  <line x1="22" y1="52" x2="118" y2="52" stroke="#d0e4f5" stroke-width="1" />

  <!-- ── BRAND TEXT ── -->

  <!-- "Safari Wings" — serif, navy, bold, centred -->
  <text
    x="70"
    y="70"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="19"
    font-weight="700"
    fill="#0d2b4e"
    letter-spacing="-0.3"
  >Safari Wings</text>

  <!-- "TRAVEL" — sans-serif, gold, wide tracking, centred -->
  <!-- letter-spacing shifts the visual centre right; compensate with x=64 -->
  <text
    x="64"
    y="83"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10"
    font-weight="600"
    fill="#c8922a"
    letter-spacing="5"
  >TRAVEL</text>

</svg>
